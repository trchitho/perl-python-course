<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Forgot Password</title>
  <link rel="stylesheet" href="/frontend/assets/fonts.css">
  <link rel="stylesheet" href="/frontend/assets/responsive.css">
  <link rel="stylesheet" href="/frontend/assets/theme.css">
  <script defer src="/frontend/assets/components.js"></script>
</head>
<body class="w3-has-top">
  <div data-component="Navbar"></div>
  <main class="w3-container w3-section" style="max-width:520px;">
    <div class="w3-card">
      <h2>Forgot Password</h2>
      <p>Enter your email to request a reset link.</p>
      <form id="f">
        <input id="email" type="email" placeholder="Email" style="width:100%;margin:6px 0;padding:10px;">
        <button class="w3-button" type="submit">Send request</button>
      </form>
      <div id="msg" style="margin-top:8px;color:#666;"></div>
    </div>
  </main>
  <div data-component="Footer"></div>
  <script>
    document.getElementById('f').addEventListener('submit', function(e){
      e.preventDefault();
      document.getElementById('msg').textContent = 'If this were connected to email, a reset link would be sent.';
    });
  </script>
</body>
</html>
