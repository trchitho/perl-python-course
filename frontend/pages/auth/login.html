<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login</title>
  <link rel="stylesheet" href="/frontend/assets/fonts.css">
  <link rel="stylesheet" href="/frontend/assets/responsive.css">
  <link rel="stylesheet" href="/frontend/assets/theme.css">
  <script defer src="/frontend/assets/components.js"></script>
</head>
<body class="w3-has-top">
  <div data-component="Navbar"></div>
  <main class="w3-container w3-section" style="max-width:460px;">
    <div class="w3-card">
      <h2>Login</h2>
      <form id="f">
        <input id="email" type="email" placeholder="Email" style="width:100%;margin:6px 0;padding:10px;">
        <input id="password" type="password" placeholder="Password" style="width:100%;margin:6px 0;padding:10px;">
        <button class="w3-button" type="submit" style="width:100%;margin-top:8px;">Login</button>
      </form>
      <div id="msg" style="margin-top:8px;color:#666;"></div>
      <p style="margin-top:8px;"><a href="/frontend/pages/auth/forgot-password.html">Forgot password?</a></p>
      <p>No account? <a href="/frontend/pages/auth/register.html">Register</a></p>
    </div>
  </main>
  <div data-component="Footer"></div>
  <script type="module">
    import { login } from '/frontend/services/authAPI.js';
    const f = document.getElementById('f'); const msg = document.getElementById('msg');
    f.addEventListener('submit', async (e)=>{
      e.preventDefault();
      try{
        const data = await login(document.getElementById('email').value, document.getElementById('password').value);
        localStorage.setItem('token', data.token);
        localStorage.setItem('role', data.role);
        if (data.fullname) localStorage.setItem('fullname', data.fullname);
        if (data.email) localStorage.setItem('email', data.email);
        const params = new URLSearchParams(location.search);
        const next = params.get('next');
        let dest = next || '/frontend/index.html';
        if (!next) {
          if (data.role === 'teacher') dest = '/frontend/pages/teacher/dashboard.html';
          else if (data.role === 'admin') dest = '/frontend/pages/admin/dashboard.html';
        }
        location.href = dest;
      }catch(err){ msg.textContent = 'Login failed'; }
    });
  </script>
</body>
</html>
