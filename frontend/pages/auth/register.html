<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Register</title>
  <link rel="stylesheet" href="/frontend/assets/fonts.css">
  <link rel="stylesheet" href="/frontend/assets/responsive.css">
  <link rel="stylesheet" href="/frontend/assets/theme.css">
  <script defer src="/frontend/assets/components.js"></script>
</head>
<body class="w3-has-top">
  <div data-component="Navbar"></div>
  <main class="w3-container w3-section" style="max-width:520px;">
    <div class="w3-card">
      <h2>Register</h2>
      <form id="f">
        <input id="fullname" placeholder="Full name" style="width:100%;margin:6px 0;padding:10px;">
        <input id="email" type="email" placeholder="Email" style="width:100%;margin:6px 0;padding:10px;">
        <input id="password" type="password" placeholder="Password" style="width:100%;margin:6px 0;padding:10px;">
        <select id="role" style="width:100%;margin:6px 0;padding:10px;">
          <option value="student">Student</option>
          <option value="teacher">Teacher</option>
        </select>
        <input id="department" placeholder="Department (teachers)" style="width:100%;margin:6px 0;padding:10px;display:none;">
        <button class="w3-button" type="submit" style="width:100%;margin-top:8px;">Register</button>
      </form>
      <div id="msg" style="margin-top:8px;color:#666;"></div>
    </div>
  </main>
  <div data-component="Footer"></div>
  <script type="module">
    import { register } from '/frontend/services/authAPI.js';
    const f = document.getElementById('f'); const msg = document.getElementById('msg');
    const role = document.getElementById('role'); const dept = document.getElementById('department');
    role.addEventListener('change',()=>{ dept.style.display = role.value==='teacher' ? 'block':'none'; });
    f.addEventListener('submit', async (e)=>{
      e.preventDefault();
      try{
        const body = { fullname: fullname.value, email: email.value, password: password.value, role: role.value };
        if(role.value==='teacher') body.department = dept.value;
        await register(body);
        msg.textContent = 'Registration successful';
        setTimeout(()=> location.href='/frontend/pages/auth/login.html', 700);
      }catch(err){ msg.textContent = 'Register failed'; }
    });
  </script>
</body>
</html>
