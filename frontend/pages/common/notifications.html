<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Notifications</title>
  <link rel="stylesheet" href="/frontend/assets/fonts.css">
  <link rel="stylesheet" href="/frontend/assets/responsive.css">
  <link rel="stylesheet" href="/frontend/assets/theme.css">
  <script defer src="/frontend/assets/components.js"></script>
</head>
<body class="w3-has-top">
  <div data-component="Navbar"></div>
  <div style="display:flex;">
    <div data-component="Sidebar"></div>
    <main class="w3-container w3-section" style="flex:1;">
      <h1>Notifications</h1>
      <div id="noti"></div>
    </main>
  </div>
  <div data-component="Footer"></div>
  <script type="module">
    import { getAnnouncements as getStudentAnnouncements } from '/frontend/services/studentAPI.js';
    import { listTeacherAnnouncements } from '/frontend/services/teacherAPI.js';
    const token = localStorage.getItem('token');
    const role = (localStorage.getItem('role') || 'student').toLowerCase();
    const box = document.getElementById('noti');

    async function fetchAnnouncements(){
      if(!token){
        box.innerHTML = '<p>Vui lòng đăng nhập để xem thông báo.</p>';
        return [];
      }
      if(role === 'teacher' || role === 'admin'){
        return listTeacherAnnouncements(token);
      }
      return getStudentAnnouncements(token);
    }

    try{
      const data = await fetchAnnouncements();
      if(!Array.isArray(data) || data.length===0){
        box.innerHTML = '<p>No notifications</p>';
      } else {
        box.innerHTML = data.map(n=>{
          const course = n.course_name || (`Khóa học #${n.course_id||''}`);
          const teacherText = n.teacher_name ? `Giảng viên: ${n.teacher_name}` : (role === 'teacher' ? '' : 'Giảng viên: (chưa cập nhật)');
          const title = n.title || 'Announcement';
          const time = n.created_at ? `<span style="color:#94a3b8;font-size:12px;">${n.created_at}</span>` : '';
          return `<div class='card'>
            <div><b>${course}</b> — ${title} ${time}</div>
            ${teacherText ? `<div style="color:#6b7280;font-size:13px;">${teacherText}</div>` : ''}
            <div>${n.message}</div>
          </div>`;
        }).join('');
      }
    }catch(err){
      const msg = err?.message || 'Failed to load notifications';
      box.innerHTML = `<p style='color:red'>${msg}</p>`;
    }
  </script>
</body>
</html>
