<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Student Quiz</title>
  <link rel="stylesheet" href="/frontend/assets/fonts.css?v=20251108-1">
  <link rel="stylesheet" href="/frontend/assets/responsive.css?v=20251108-1">
  <link rel="stylesheet" href="/frontend/assets/theme.css?v=20251108-1">
  <style>
    .quiz-locked .quiz-card{
      background:#f3f4f6;
      border-color:#d1d5db;
      opacity:0.75;
    }
    .quiz-locked .quiz-card h3{color:#6b7280;}
    .quiz-locked .quiz-card label{pointer-events:none;}
  </style>
  <script defer src="/frontend/assets/components.js?v=20251108-1"></script>
</head>
<body class="w3-has-top">
  <div data-component="Navbar"></div>
  <div style="display:flex;">
    <div data-component="Sidebar"></div>
    <main class="w3-container w3-section" style="flex:1;max-width:1120px;">
      <h1>Quiz</h1>
      <a id="back-to-lesson" class="w3-button" href="#">📚 Back to lesson</a>
      <div id="quiz"></div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:12px;">
        <button id="submit" class="w3-button">Submit</button>
        <button id="redo" class="w3-button w3-outline" style="display:none;">Làm lại</button>
        <div id="status" style="color:#666;"></div>
      </div>
    </main>
  </div>
  <div data-component="Footer"></div>
  <script type="module" src="/frontend/pages/student/quiz.js?v=20251108-1"></script>
</body>
</html>
