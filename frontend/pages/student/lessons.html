<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Student Lessons</title>
  <link rel="stylesheet" href="/frontend/assets/fonts.css?v=20251108-1">
  <link rel="stylesheet" href="/frontend/assets/responsive.css?v=20251108-1">
  <link rel="stylesheet" href="/frontend/assets/theme.css?v=20251108-1">
  <style>
    .lesson-grid { display:grid; grid-template-columns: 280px 1fr; gap:16px; }
    @media (max-width: 900px){ .lesson-grid { grid-template-columns: 1fr; } }
    #lsNav { list-style:none; padding:0; margin:0; }
    #lsNav li { margin:4px 0; }
    #lsNav a { display:block; padding:10px 12px; border:1px solid #e5e7eb; border-radius:8px; color:#111; background:#fff; text-decoration:none; }
    #lsNav a:hover { background:#f8fafc; }
    #lsNav a.active { border-color:#2563eb; background:#eff6ff; color:#1d4ed8; font-weight:600; }
    .video-embed { position:relative; padding-bottom:56.25%; height:0; overflow:hidden; border-radius:8px; background:#000; }
    .video-embed iframe { position:absolute; top:0; left:0; width:100%; height:100%; }
    video { border-radius:8px; background:#000; }
    #vTitle { margin-bottom:6px; }
    #vContent { line-height:1.6; }
  </style>
  <script defer src="/frontend/assets/components.js?v=20251108-1"></script>
</head>
<body class="w3-has-top">
  <div data-component="Navbar"></div>
  <div style="display:flex;">
    <div data-component="Sidebar"></div>
    <main class="w3-container w3-section" style="flex:1;max-width:1120px;">
      <h1>Lessons</h1>
      <p id="courseInfo" style="color:#4b5563;margin-top:0;margin-bottom:8px;"></p>
      <div id="coursePicker" style="margin-bottom:16px;"></div>
      <div class="lesson-grid">
        <div>
          <h3>Lesson List</h3>
          <ul id="lsNav" class="simple-list"></ul>
        </div>
        <div>
          <div class="card">
            <h3 id="vTitle">Select a lesson</h3>
            <div id="vVideo" style="margin:8px 0"></div>
            <div id="vContent" style="white-space:pre-line;color:#111"></div>
            <div style="margin-top:10px">
              <a id="vQuizBtn" class="w3-button w3-outline" href="/frontend/pages/student/quiz.html">Open Quizzes</a>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>
  <div data-component="Footer"></div>
  <script type="module">
    import { getCourseDetail, getLessonDetail } from '/frontend/services/studentAPI.js';
    import { listAllCourses } from '/frontend/services/courseAPI.js';
    const params = new URLSearchParams(location.search);
    const courseId = params.get('course_id');
    const lessonId = params.get('lesson_id');
    const token = localStorage.getItem('token');
    if(!token){
      location.href = `/frontend/pages/auth/login.html?next=${encodeURIComponent(location.href)}`;
    }
    const lsNav = document.getElementById('lsNav');
    const vTitle = document.getElementById('vTitle');
    const vVideo = document.getElementById('vVideo');
    const vContent = document.getElementById('vContent');
    const vQuizBtn = document.getElementById('vQuizBtn');
    const courseInfo = document.getElementById('courseInfo');
    const coursePicker = document.getElementById('coursePicker');
    coursePicker.style.display = courseId ? 'none' : 'block';

    async function renderLessonList(cid){
      coursePicker.style.display = 'none';
      lsNav.innerHTML = '<li>Loading lessons...</li>';
      try{
        const c = await getCourseDetail(token, cid);
        courseInfo.textContent = `${c.name||c.title||'Course'} – ${c.description||''}`.trim();
        if(!c.lessons || c.lessons.length===0){
          lsNav.innerHTML = '<li>No lessons available yet.</li>';
          return;
        }
        lsNav.innerHTML = c.lessons.map(l => `<li><a href='/frontend/pages/student/lessons.html?course_id=${cid}&lesson_id=${l.id}'>${l.title||'Lesson'}</a></li>`).join('');
        if(lessonId){
          lsNav.querySelectorAll('a').forEach(a => {
            if(new URL(a.href, location.href).searchParams.get('lesson_id') === lessonId){
              a.classList.add('active');
            }
          });
        }
      }catch(e){
        lsNav.innerHTML = '<li>Failed to load lessons</li>';
      }
    }

    async function showCoursePicker(){
      coursePicker.innerHTML = '<p>Loading courses...</p>';
      try{
        const courses = await listAllCourses(token);
        const enrolled = (courses||[]).filter(c => c.enrolled);
        if(!enrolled.length){
          coursePicker.innerHTML = '<p>You are not enrolled in any course yet. Visit <a href="/frontend/pages/student/courses.html">Courses</a>.</p>';
          return;
        }
        coursePicker.innerHTML = `<div class="card-grid">${enrolled.map(c => `
          <a class="card card-course" href="/frontend/pages/student/lessons.html?course_id=${c.id}">
            <span>${c.name||('Course #'+c.id)}</span>
            <div style="color:#666;margin-top:4px">${(c.description||'').slice(0,100)}</div>
          </a>`).join('')}</div>`;
      }catch(e){
        coursePicker.innerHTML = '<p>Cannot load your courses.</p>';
      }
    }

    if(courseId){
      await renderLessonList(courseId);
    } else {
      coursePicker.innerHTML = '<p>Select a course to view its lessons.</p>';
      await showCoursePicker();
      lsNav.innerHTML = '<li>Please select a course above.</li>';
    }

    function renderMedia(url){
      if(!url) return '';
      const u = url.trim();
      const lower = u.toLowerCase();
      if(lower.includes('youtube.com/watch?v=') || lower.includes('youtu.be/')){
        let id = '';
        try{
          if(lower.includes('watch?v=')){
            const q = new URL(u).searchParams;
            id = q.get('v') || '';
          } else {
            id = u.split('/').pop().split('?')[0];
          }
        }catch(_e){}
        if(id){
          const embed = `https://www.youtube.com/embed/${id}`;
          return `<div class='video-embed'><iframe width='560' height='315' src='${embed}' title='YouTube video player' frameborder='0' allow='accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture' allowfullscreen></iframe></div>`;
        }
      }
      if(lower.endsWith('.mp4') || lower.endsWith('.webm') || lower.endsWith('.ogg')){
        return `<video controls style='max-width:100%'><source src='${u}'></video>`;
      }
      return `<iframe src='${u}' style='width:100%; min-height:360px' frameborder='0' allowfullscreen></iframe>`;
    }

    async function loadLesson(){
      if(!lessonId) return;
      try{
        const l = await getLessonDetail(token, lessonId);
        vTitle.textContent = l.title || 'Lesson';
        vContent.textContent = l.content || '';
        vVideo.innerHTML = renderMedia(l.video_url);
        vQuizBtn.href = `/frontend/pages/student/quiz.html?course_id=${courseId}`;
      }catch(e){
        vContent.textContent = 'Failed to load lesson';
      }
    }
    loadLesson();
  </script>
</body>
</html>
