<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>My Profile</title>
  <link rel="stylesheet" href="/frontend/assets/fonts.css?v=20251108-1">
  <link rel="stylesheet" href="/frontend/assets/responsive.css?v=20251108-1">
  <link rel="stylesheet" href="/frontend/assets/theme.css?v=20251108-1">
  <script defer src="/frontend/assets/components.js?v=20251108-1"></script>
</head>
<body class="w3-has-top">
  <div data-component="Navbar"></div>
  <div style="display:flex;">
    <div data-component="Sidebar"></div>
    <main class="w3-container w3-section" style="flex:1;max-width:1120px;">
      <h1>My Profile</h1>
      <div class="card">
        <h3>Personal Info</h3>
        <form id="fProfile">
          <label>Full name</label>
          <input id="fullname" placeholder="Full name" style="width:100%;margin:6px 0;padding:10px;">
          <label>Email</label>
          <input id="email" type="email" placeholder="Email" disabled style="width:100%;margin:6px 0;padding:10px;">
          <button class="w3-button" type="submit">Save</button>
          <span id="msg1" style="margin-left:8px;color:#666"></span>
        </form>
      </div>
      <div class="card">
        <h3>Change Password</h3>
        <form id="fPass">
          <input id="p1" type="password" placeholder="New password" style="width:100%;margin:6px 0;padding:10px;">
          <input id="p2" type="password" placeholder="Confirm password" style="width:100%;margin:6px 0;padding:10px;">
          <button class="w3-button" type="submit">Update Password</button>
          <span id="msg2" style="margin-left:8px;color:#666"></span>
        </form>
      </div>
      <div class="card">
        <h3>Security</h3>
        <p>Two‑Factor Authentication (2FA): <em>coming soon</em>.</p>
      </div>
    </main>
  </div>
  <div data-component="Footer"></div>
  <script type="module">
    import { getMe, updateMe, changePassword } from '/frontend/services/profileAPI.js';
    const token = localStorage.getItem('token');
    if(!token){ location.href = '/frontend/pages/auth/login.html?next='+encodeURIComponent(location.href); }
    const f1 = document.getElementById('fProfile');
    const f2 = document.getElementById('fPass');
    const msg1 = document.getElementById('msg1');
    const msg2 = document.getElementById('msg2');
    const fullname = document.getElementById('fullname');
    const email = document.getElementById('email');
    (async ()=>{
      try{
        const me = await getMe(token);
        fullname.value = me.fullname||'';
        email.value = me.email||'';
      }catch(e){ msg1.textContent = 'Failed to load profile'; }
    })();
    f1.addEventListener('submit', async (e)=>{
      e.preventDefault();
      try{
        await updateMe(token, { fullname: fullname.value.trim() });
        localStorage.setItem('fullname', fullname.value.trim());
        msg1.textContent = 'Saved';
      }catch(e){ msg1.textContent = 'Save failed'; }
    });
    f2.addEventListener('submit', async (e)=>{
      e.preventDefault();
      const p1 = document.getElementById('p1').value;
      const p2 = document.getElementById('p2').value;
      if(!p1 || !p2 || p1!==p2){ msg2.textContent = 'Passwords do not match'; return; }
      try{
        const r = await changePassword(token, '', p1); // optional: ask current password if required
        msg2.textContent = r.message||'Updated';
      }catch(e){ msg2.textContent = 'Update failed'; }
    });
  </script>
</body>
</html>
