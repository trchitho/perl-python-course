<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Progress</title>
  <link rel="stylesheet" href="/frontend/assets/fonts.css?v=20251108-1">
  <link rel="stylesheet" href="/frontend/assets/responsive.css?v=20251108-1">
  <link rel="stylesheet" href="/frontend/assets/theme.css?v=20251108-1">
  <script defer src="/frontend/assets/components.js?v=20251108-1"></script>
</head>
<body class="w3-has-top">
  <div data-component="Navbar"></div>
  <div style="display:flex;">
    <div data-component="Sidebar"></div>
    <main class="w3-container w3-section" style="flex:1;max-width:1120px;">
      <h1>Progress</h1>
      <div class="card" id="overallBox">
        <h3>Overall Progress</h3>
        <div id="overallStats" style="display:flex;gap:16px;flex-wrap:wrap;"></div>
      </div>
      <section class="card" style="margin-top:16px;">
        <h3>Courses</h3>
        <div id="courseProgress" class="card-grid"></div>
      </section>
    </main>
  </div>
  <div data-component="Footer"></div>
  <script type="module">
    import { getProgress } from '/frontend/services/studentAPI.js';
    const token = localStorage.getItem('token');
    const courseContainer = document.getElementById('courseProgress');
    const overallStats = document.getElementById('overallStats');
    try{
      const data = await getProgress(token);
      if(!Array.isArray(data) || data.length===0){
        courseContainer.innerHTML = '<p>No progress yet.</p>';
      } else {
        let totalCourses = data.length;
        let avgProgress = Math.round(data.reduce((sum,p)=>sum+(p.progress_percent||0),0)/totalCourses);
        let avgScore = Math.round(data.reduce((sum,p)=>sum+(p.avg_score||0),0)/totalCourses);
        let totalLessons = data.reduce((sum,p)=>sum+(p.total_lessons||0),0);
        let totalCompletedLessons = data.reduce((sum,p)=>sum+(p.completed_lessons||0),0);
        overallStats.innerHTML = `
          <div><strong>${totalCourses}</strong><div>Khóa học</div></div>
          <div><strong>${totalCompletedLessons}/${totalLessons}</strong><div>Bài học hoàn thành</div></div>
          <div><strong>${avgProgress}%</strong><div>Tiến độ trung bình</div></div>
          <div><strong>${avgScore}</strong><div>Điểm trung bình</div></div>
        `;
        courseContainer.innerHTML = data.map(p=>{
          const percent = (p.progress_percent||0);
          return `<div class="card">
            <h4>${p.course_title || ('Course #'+p.course_id)}</h4>
            <div style="font-size:13px;color:#6b7280;margin-bottom:6px;">
              ${p.completed_lessons}/${p.total_lessons} lessons • ${p.completed_quizzes}/${p.total_quizzes} quizzes
            </div>
            <div class='progress-bar'><div class='progress-bar-inner' style='width:${percent}%'>${percent}%</div></div>
            <div style="margin-top:6px;font-size:13px;">Điểm trung bình: ${p.avg_score}</div>
          </div>`;
        }).join('');
      }
    }catch(err){
      courseContainer.innerHTML = `<p style='color:red'>Failed to load progress</p>`;
    }
  </script>
</body>
</html>
