<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Teacher Dashboard</title>
  <link rel="stylesheet" href="/frontend/assets/fonts.css?v=20251108-1">
  <link rel="stylesheet" href="/frontend/assets/responsive.css?v=20251108-1">
  <link rel="stylesheet" href="/frontend/assets/theme.css?v=20251108-1">
  <script defer src="/frontend/assets/components.js?v=20251108-1"></script>
</head>
<body class="w3-has-top">
  <div data-component="Navbar"></div>
  <div style="display:flex;">
    <div data-component="Sidebar"></div>
    <main class="w3-container w3-section" style="flex:1;max-width:1120px;">
      <section class="section-head"><div>
        <h1 class="section-title">Teacher Dashboard</h1>
        <p class="section-sub">Manage content and track learning outcomes</p>
      </div></section>
      <section class="card-grid" id="stats">
        <div class="card"><h3>Courses</h3><div id="stCourses" class="big">—</div></div>
        <div class="card"><h3>Students</h3><div id="stStudents" class="big">—</div></div>
        <div class="card"><h3>Quizzes</h3><div id="stQuizzes" class="big">—</div></div>
        <div class="card"><h3>Average Score</h3><div id="stAvg" class="big">—</div></div>
      </section>
      <section class="section">
        <h2 class="section-title">Quick Links</h2>
        <div class="card-grid">
          <a class="card" href="/frontend/pages/teacher/courses.html"><span>Course Management</span></a>
          <a class="card" href="/frontend/pages/teacher/lessons.html"><span>Lesson Management</span></a>
          <a class="card" href="/frontend/pages/teacher/quizzes.html"><span>Quiz Management</span></a>
          <a class="card" href="/frontend/pages/teacher/subscribers.html"><span>Subscribers</span></a>
          <a class="card" href="/frontend/pages/teacher/announcements.html"><span>Announcements</span></a>
        </div>
      </section>
    </main>
  </div>
  <div data-component="Footer"></div>
  <script type="module">
    import { getTeacherStats } from '/frontend/services/teacherAPI.js';
    const token = localStorage.getItem('token');
    (async ()=>{
      try{
        const s = await getTeacherStats(token);
        document.getElementById('stCourses').textContent = s.courses ?? '0';
        document.getElementById('stStudents').textContent = s.students ?? '0';
        document.getElementById('stQuizzes').textContent = s.quizzes ?? '0';
        document.getElementById('stAvg').textContent = (s.avg_score??0).toFixed(1);
      }catch(e){ /* silent */ }
    })();
  </script>
</body>
</html>
