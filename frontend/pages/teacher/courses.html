<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Teacher Courses</title>
  <link rel="stylesheet" href="/frontend/assets/fonts.css?v=20251108-1">
  <link rel="stylesheet" href="/frontend/assets/responsive.css?v=20251108-1">
  <link rel="stylesheet" href="/frontend/assets/theme.css?v=20251108-1">
  <script defer src="/frontend/assets/components.js?v=20251108-1"></script>
</head>
<body class="w3-has-top">
  <div data-component="Navbar"></div>
  <div style="display:flex;">
    <div data-component="Sidebar"></div>
    <main class="w3-container w3-section" style="flex:1;max-width:1120px;">
      <section class="section-head"><div>
        <h1 class="section-title">Course Management</h1>
        <p class="section-sub">Create, edit, publish or delete courses</p>
      </div></section>

      <section class="card" style="margin-bottom:16px;">
        <h3>New Course</h3>
        <form id="fNew">
          <input id="title" placeholder="Course title" style="width:100%;padding:10px;margin:6px 0;">
          <textarea id="desc" placeholder="Description" style="width:100%;padding:10px;margin:6px 0;min-height:80px"></textarea>
          <div style="display:flex;gap:8px;flex-wrap:wrap">
            <input id="category" placeholder="Category" style="flex:1;min-width:200px;padding:10px;">
            <input id="duration" type="number" placeholder="Duration (min)" style="width:200px;padding:10px;">
            <select id="status" style="width:200px;padding:10px;">
              <option value="draft">Draft</option>
              <option value="published">Published</option>
            </select>
            <button class="w3-button" type="submit">Create</button>
          </div>
          <div id="msgNew" style="color:#666;margin-top:6px"></div>
        </form>
      </section>

      <section>
        <h3>My Courses</h3>
        <div id="list" class="card-grid"></div>
      </section>
    </main>
  </div>
  <div data-component="Footer"></div>
  <script type="module">
    import { listTeacherCourses, createCourse, toggleCourseStatus, deleteCourse } from '/frontend/services/teacherAPI.js';
    const token = localStorage.getItem('token');
    const list = document.getElementById('list');
    async function refresh(){
      try{
        const data = await listTeacherCourses(token);
        list.innerHTML = data.map(c=>`
          <div class='card'>
            <h3>${c.name||c.title}</h3>
            <div style='color:#555'>${c.description||''}</div>
            <div style='margin:6px 0'>Status: <b>${c.status||'draft'}</b></div>
            <div style='display:flex;gap:6px;flex-wrap:wrap'>
              <button class='w3-button w3-outline' data-act='pub' data-id='${c.id}' data-status='${c.status==='published'?'draft':'published'}'>${c.status==='published'?'Set Draft':'Publish'}</button>
              <a class='w3-button w3-outline' href='/frontend/pages/teacher/lessons.html?course_id=${c.id}'>Lessons</a>
              <a class='w3-button w3-outline' href='/frontend/pages/teacher/quizzes.html?course_id=${c.id}'>Quizzes</a>
              <a class='w3-button w3-outline' href='/frontend/pages/teacher/subscribers.html?course_id=${c.id}'>Subscribers</a>
              <button class='w3-button w3-outline' data-act='del' data-id='${c.id}'>Delete</button>
            </div>
          </div>
        `).join('');
        list.querySelectorAll('button[data-act]').forEach(btn=>{
          btn.addEventListener('click', async ()=>{
            const id = btn.getAttribute('data-id');
            const act = btn.getAttribute('data-act');
            try{
              if(act==='pub'){
                const status = btn.getAttribute('data-status');
                await toggleCourseStatus(token, id, status);
              } else if(act==='del'){
                await deleteCourse(token, id);
              }
              await refresh();
            }catch(e){ alert('Action failed'); }
          });
        });
      }catch(e){ list.innerHTML = `<div class='card'>Failed to load courses</div>`; }
    }
    document.getElementById('fNew').addEventListener('submit', async (e)=>{
      e.preventDefault();
      const body = { name: title.value.trim(), description: desc.value.trim(), category: category.value.trim(), duration: Number(duration.value)||0, status: status.value };
      try{ await createCourse(token, body); msgNew.textContent='Created'; await refresh(); }
      catch(err){ msgNew.textContent='Create failed'; }
    });
    refresh();
  </script>
</body>
</html>
