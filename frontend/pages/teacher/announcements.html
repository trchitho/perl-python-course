<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Announcements</title>
  <link rel="stylesheet" href="/frontend/assets/fonts.css?v=20251108-1">
  <link rel="stylesheet" href="/frontend/assets/responsive.css?v=20251108-1">
  <link rel="stylesheet" href="/frontend/assets/theme.css?v=20251108-1">
  <script defer src="/frontend/assets/components.js?v=20251108-1"></script>
</head>
<body class="w3-has-top">
  <div data-component="Navbar"></div>
  <div style="display:flex;">
    <div data-component="Sidebar"></div>
    <main class="w3-container w3-section" style="flex:1;max-width:1120px;">
      <h1>Announcements</h1>
      <form id="annForm" class="w3-card" style="margin-bottom:16px;">
        <label style="display:flex;flex-direction:column;gap:6px;margin:6px 0;">
          <span>Chọn khóa học</span>
          <select id="courseSelect" required style="width:100%;padding:10px;border:1px solid #d1d5db;border-radius:6px;">
            <option value="">Đang tải...</option>
          </select>
        </label>
        <textarea id="message" placeholder="Write an announcement" style="width:100%;padding:10px;margin:6px 0;min-height:100px"></textarea>
        <button class="w3-button" type="submit">Send</button>
        <div id="annMsg" style="color:#666;margin-top:8px;"></div>
      </form>
      <div id="annList" class="card-grid"></div>
    </main>
  </div>
  <div data-component="Footer"></div>
  <script type="module">
    import { listTeacherCourses } from '/frontend/services/teacherAPI.js';
    const token = localStorage.getItem('token');
    const msg = document.getElementById('annMsg');
    const list = document.getElementById('annList');
    const courseSelect = document.getElementById('courseSelect');
    const API_BASE = 'http://127.0.0.1:5000/api';

    async function load(courseId){
      if(!token){
        list.innerHTML = "<div class='card'>Vui lòng đăng nhập để xem thông báo.</div>";
        return;
      }
      const url = courseId ? `${API_BASE}/teacher/announcements?course_id=${courseId}` : `${API_BASE}/teacher/announcements`;
      try{
        const res = await fetch(url, { headers:{'Authorization':'Bearer '+token} });
        if(!res.ok){
          const err = await res.json().catch(()=>({message:'Failed to load'}));
          list.innerHTML = `<div class='card' style='color:#b91c1c'>${err.message||'Failed to load announcements'}</div>`;
          return;
        }
        const data = await res.json();
        list.innerHTML = (data||[]).map(a => `
          <div class='card'>
            <div style='font-weight:600'>${a.course_name || ('Course #'+(a.course_id||''))}</div>
            <div style='color:#6b7280;font-size:13px;'>${a.created_at||''}</div>
            <div style='margin-top:6px'><b>${a.title||'Announcement'}</b></div>
            <div>${a.message}</div>
          </div>`).join('') || "<div class='card'>Chưa có thông báo nào.</div>";
      }catch(e){
        list.innerHTML = "<div class='card' style='color:#b91c1c'>Không thể kết nối tới máy chủ.</div>";
      }
    }

    document.getElementById('annForm').addEventListener('submit', async (e)=>{
      e.preventDefault();
      const selectedCourse = Number(courseSelect.value) || null;
      const body = { course_id: selectedCourse, title: '', message: document.getElementById('message').value.trim() };
      if(!body.message){ msg.textContent = 'Message required'; return; }
      if(!selectedCourse){ msg.textContent = 'Chọn khóa học'; return; }
      try{
        const res = await fetch(`${API_BASE}/teacher/announcements`, { method:'POST', headers:{'Content-Type':'application/json','Authorization':'Bearer '+token}, body: JSON.stringify(body) });
        if(!res.ok){
          const err = await res.json().catch(()=>({message:'Failed to send'}));
          msg.textContent = err.message || 'Failed to send';
          return;
        }
        msg.textContent = 'Sent'; document.getElementById('message').value='';
        await load(selectedCourse);
      }catch(e){
        msg.textContent = 'Không thể kết nối tới máy chủ';
      }
    });

    courseSelect.addEventListener('change', ()=>{
      const cid = Number(courseSelect.value)||undefined;
      load(cid);
      const url = new URL(location.href);
      if(cid) url.searchParams.set('course_id', cid); else url.searchParams.delete('course_id');
      window.history.replaceState({}, '', url);
    });

    (async ()=>{
      try{
        const courses = await listTeacherCourses(token);
        if(!courses.length){
          courseSelect.innerHTML = '<option value="">Chưa có khóa học</option>';
          list.innerHTML = "<div class='card'>Tạo khóa học trước khi gửi thông báo.</div>";
          return;
        }
        courseSelect.innerHTML = ['<option value="">-- Chọn khóa học --</option>', ...courses.map(c=>`<option value="${c.id}">${c.name||('Course #'+c.id)}</option>`)].join('');
        const initial = Number(new URLSearchParams(location.search).get('course_id')) || '';
        if(initial && courses.some(c=>Number(c.id)===initial)){
          courseSelect.value = initial;
          load(initial);
        } else if(courses.length === 1){
          courseSelect.value = courses[0].id;
          load(courses[0].id);
        }
      }catch(e){
        msg.textContent = 'Không thể tải danh sách khóa học';
      }
    })();
  </script>
</body>
</html>
