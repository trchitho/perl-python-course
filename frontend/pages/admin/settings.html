<!DOCTYPE html>
<html lang="en"><head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin Settings</title>
  <link rel="stylesheet" href="/frontend/assets/fonts.css?v=20251108-1"><link rel="stylesheet" href="/frontend/assets/responsive.css?v=20251108-1"><link rel="stylesheet" href="/frontend/assets/theme.css?v=20251108-1">
  <script defer src="/frontend/assets/components.js?v=20251108-1"></script>
</head>
<body class="w3-has-top">
  <div data-component="Navbar"></div>
  <div style="display:flex;">
    <div data-component="Sidebar"></div>
    <main class="w3-container w3-section" style="flex:1;max-width:1120px;">
      <section class="section-head"><div>
        <h1 class="section-title">System Settings</h1>
        <p class="section-sub">SMTP, chatbot API keys, upload limits, backup</p>
      </div></section>
      <section class="card">
        <form id="fSet">
          <h3>SMTP</h3>
          <div class="grid-2">
            <input id="smtpHost" placeholder="SMTP Host" style="padding:10px">
            <input id="smtpPort" type="number" placeholder="SMTP Port" style="padding:10px">
            <input id="smtpUser" placeholder="SMTP User" style="padding:10px">
            <input id="smtpPass" type="password" placeholder="SMTP Password" style="padding:10px">
          </div>
          <h3>AI / Uploads</h3>
          <div class="grid-2">
            <input id="aiKey" placeholder="Chatbot API Key" style="padding:10px">
            <input id="uploadLimit" type="number" placeholder="Upload limit (MB)" style="padding:10px">
          </div>
          <div style="display:flex;gap:8px;margin-top:8px;flex-wrap:wrap">
            <button class="w3-button" type="submit">Save Settings</button>
            <button id="btnBackup" class="w3-button w3-outline" type="button">Backup DB</button>
            <span id="msg" style="color:#666"></span>
          </div>
        </form>
      </section>
    </main>
  </div>
  <div data-component="Footer"></div>
  <script type="module">
    import { getSettings, updateSettings, runBackup } from '/frontend/services/adminAPI.js';
    const token = localStorage.getItem('token');
    (async ()=>{
      try{
        const s = await getSettings(token);
        smtpHost.value = s.smtp_host||''; smtpPort.value = s.smtp_port||''; smtpUser.value=s.smtp_user||''; smtpPass.value='';
        aiKey.value = s.ai_key||''; uploadLimit.value = s.upload_limit_mb||'';
      }catch(e){ /* ignore */ }
    })();
    document.getElementById('fSet').addEventListener('submit', async (e)=>{
      e.preventDefault();
      const body = { smtp_host:smtpHost.value.trim(), smtp_port:Number(smtpPort.value)||0, smtp_user:smtpUser.value.trim(), smtp_pass:smtpPass.value, ai_key:aiKey.value.trim(), upload_limit_mb:Number(uploadLimit.value)||0 };
      try{ await updateSettings(token, body); msg.textContent='Saved'; } catch(e){ msg.textContent='Save failed'; }
    });
    document.getElementById('btnBackup').addEventListener('click', async ()=>{
      try{ await runBackup(token); msg.textContent='Backup started'; } catch(e){ msg.textContent='Backup failed'; }
    });
  </script>
</body></html>
