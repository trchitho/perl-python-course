<!DOCTYPE html>
<html lang="en"><head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin Users</title>
  <link rel="stylesheet" href="/frontend/assets/fonts.css?v=20251108-1"><link rel="stylesheet" href="/frontend/assets/responsive.css?v=20251108-1"><link rel="stylesheet" href="/frontend/assets/theme.css?v=20251108-1">
  <script defer src="/frontend/assets/components.js?v=20251108-1"></script>
</head>
<body class="w3-has-top">
  <div data-component="Navbar"></div>
  <div style="display:flex;">
    <div data-component="Sidebar"></div>
    <main class="w3-container w3-section" style="flex:1;max-width:1120px;">
      <section class="section-head"><div>
        <h1 class="section-title">User Management</h1>
        <p class="section-sub">Create, edit, delete users and set roles</p>
      </div></section>
      <section class="card" style="margin-bottom:12px;">
        <h3>New User</h3>
        <form id="fNew">
          <input id="uName" placeholder="Full name" style="padding:10px;margin:6px 0;width:100%">
          <input id="uEmail" type="email" placeholder="Email" style="padding:10px;margin:6px 0;width:100%">
          <input id="uPass" type="password" placeholder="Password" style="padding:10px;margin:6px 0;width:100%">
          <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
            <select id="uRole" style="padding:10px"><option>student</option><option>teacher</option><option>admin</option></select>
            <button class="w3-button" type="submit">Create</button>
            <span id="msgNew" style="color:#666"></span>
          </div>
        </form>
      </section>
      <section class="card">
        <h3>Users</h3>
        <div id="userTableWrap" class="table-wrap"></div>
      </section>
    </main>
  </div>
  <div data-component="Footer"></div>
  <script type="module">
    import { listUsers, lockUser, unlockUser, createUser, deleteUser, setUserRole } from '/frontend/services/adminAPI.js';
    const token = localStorage.getItem('token');
    const wrap = document.getElementById('userTableWrap');
    async function refresh(){
      try{
        const users = await listUsers(token);
        const rows = users.map(u => `
          <tr>
            <td>${u.id}</td>
            <td>${u.fullname}</td>
            <td>${u.email}</td>
            <td>
              <select data-act='setrole' data-id='${u.id}'>
                ${['student','teacher','admin'].map(r=>`<option ${u.role===r?'selected':''}>${r}</option>`).join('')}
              </select>
            </td>
            <td>${u.is_active?'Active':'Locked'}</td>
            <td>
              ${u.is_active? `<button class='w3-button w3-outline' data-act='lock' data-id='${u.id}'>Lock</button>` : `<button class='w3-button w3-outline' data-act='unlock' data-id='${u.id}'>Unlock</button>`}
              <button class='w3-button w3-outline' data-act='del' data-id='${u.id}'>Delete</button>
            </td>
          </tr>`).join('');
        wrap.innerHTML = `<div class='table-scroll'>
          <table class='w3-table'>
            <thead><tr><th>ID</th><th>Name</th><th>Email</th><th>Role</th><th>Status</th><th>Action</th></tr></thead>
            <tbody>${rows}</tbody>
          </table>
        </div>`;
        wrap.querySelectorAll('button[data-id], select[data-id]').forEach(el=>{
          el.addEventListener('change', onAct);
          el.addEventListener('click', onAct);
        });
      }catch(err){ wrap.innerHTML = `<p style='color:red'>Failed to load users</p>`; }
    }
    async function onAct(e){
      const el = e.currentTarget; const id = el.getAttribute('data-id'); const act = el.getAttribute('data-act');
      try{
        if(act==='lock') await lockUser(token, id);
        else if(act==='unlock') await unlockUser(token, id);
        else if(act==='del') await deleteUser(token, id);
        else if(act==='setrole') await setUserRole(token, id, el.value);
        await refresh();
      }catch(err){ alert('Action failed'); }
    }
    document.getElementById('fNew').addEventListener('submit', async (e)=>{
      e.preventDefault();
      const body = { fullname: uName.value.trim(), email: uEmail.value.trim(), password: uPass.value, role: uRole.value };
      try{ await createUser(token, body); msgNew.textContent='Created'; await refresh(); }
      catch(err){ msgNew.textContent='Create failed'; }
    });
    refresh();
  </script>
</body></html>
