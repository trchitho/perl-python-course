<!DOCTYPE html>
<html lang="en"><head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin Enrollments</title>
  <link rel="stylesheet" href="/frontend/assets/fonts.css?v=20251108-1"><link rel="stylesheet" href="/frontend/assets/responsive.css?v=20251108-1"><link rel="stylesheet" href="/frontend/assets/theme.css?v=20251108-1">
  <script defer src="/frontend/assets/components.js?v=20251108-1"></script>
</head>
<body class="w3-has-top">
  <div data-component="Navbar"></div>
  <div style="display:flex;">
    <div data-component="Sidebar"></div>
    <main class="w3-container w3-section" style="flex:1;max-width:1120px;">
      <section class="section-head"><div>
        <h1 class="section-title">Enrollments</h1>
        <p class="section-sub">Approve or lock student enrollments</p>
      </div></section>
      <div id="enList" class="card-grid"></div>
    </main>
  </div>
  <div data-component="Footer"></div>
  <script type="module">
    import { listEnrollments, approveEnrollment, lockEnrollment } from '/frontend/services/adminAPI.js';
    const token = localStorage.getItem('token');
    const enList = document.getElementById('enList');
    async function refresh(){
      try{
        const data = await listEnrollments(token);
        enList.innerHTML = (data||[]).map(e=>`<div class='card'>
          <div><b>${e.student_name||('User '+e.user_id)}</b> → <b>${e.course_name||('Course '+e.course_id)}</b></div>
          <div style='color:#555'>Status: ${e.status||'pending'} | Payment: ${e.payment_status||'unknown'}</div>
          <div style='display:flex;gap:6px;margin-top:6px;'>
            ${e.status==='pending'? `<button class='w3-button w3-outline' data-act='approve' data-id='${e.id}'>Approve</button>`:''}
            <button class='w3-button w3-outline' data-act='lock' data-id='${e.id}'>Lock</button>
          </div>
        </div>`).join('') || "<div class='card'>No enrollments.</div>`;
        enList.querySelectorAll('button[data-id]').forEach(btn=>{
          btn.addEventListener('click', async ()=>{
            const id = btn.getAttribute('data-id'); const act = btn.getAttribute('data-act');
            try{ if(act==='approve') await approveEnrollment(token, id); else await lockEnrollment(token, id); await refresh(); } catch(e){ alert('Action failed'); }
          })
        })
      }catch(e){ enList.innerHTML = "<div class='card'>Failed to load</div>"; }
    }
    refresh();
  </script>
</body></html>
