<!DOCTYPE html>
<html lang="en"><head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin Dashboard</title>
  <link rel="stylesheet" href="/frontend/assets/fonts.css?v=20251108-1"><link rel="stylesheet" href="/frontend/assets/responsive.css?v=20251108-1"><link rel="stylesheet" href="/frontend/assets/theme.css?v=20251108-1">
  <script defer src="/frontend/assets/components.js?v=20251108-1"></script>
</head>
<body class="w3-has-top">
  <div data-component="Navbar"></div>
  <div style="display:flex;">
    <div data-component="Sidebar"></div>
    <main class="w3-container w3-section" style="flex:1;max-width:1120px;">
      <section class="section-head"><div>
        <h1 class="section-title">Admin Dashboard</h1>
        <p class="section-sub">System overview and quick actions</p>
      </div></section>
      <section class="card-grid" id="stats">
        <div class="card"><h3>Users</h3><div id="stUsers" class="big">—</div></div>
        <div class="card"><h3>Courses</h3><div id="stCourses" class="big">—</div></div>
        <div class="card"><h3>Error Logs</h3><div id="stErrors" class="big">—</div></div>
      </section>
      <section class="section">
        <h2 class="section-title">Quick Links</h2>
        <div class="card-grid">
          <a class="card" href="/frontend/pages/admin/users.html"><span>User Management</span></a>
          <a class="card" href="/frontend/pages/admin/enrollments.html"><span>Enrollments</span></a>
          <a class="card" href="/frontend/pages/admin/logs.html"><span>Audit Logs</span></a>
          <a class="card" href="/frontend/pages/admin/settings.html"><span>System Settings</span></a>
        </div>
      </section>
    </main>
  </div>
  <div data-component="Footer"></div>
  <script type="module">
    import { getAdminStats } from '/frontend/services/adminAPI.js';
    const token = localStorage.getItem('token');
    (async ()=>{
      try{
        const s = await getAdminStats(token);
        document.getElementById('stUsers').textContent = s.users ?? '0';
        document.getElementById('stCourses').textContent = s.courses ?? '0';
        document.getElementById('stErrors').textContent = s.errors ?? '0';
      }catch(e){ /* ignore */ }
    })();
  </script>
</body></html>
