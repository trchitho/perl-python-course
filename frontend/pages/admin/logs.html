<!DOCTYPE html>
<html lang="en"><head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin Logs</title>
  <link rel="stylesheet" href="/frontend/assets/fonts.css?v=20251108-1"><link rel="stylesheet" href="/frontend/assets/responsive.css?v=20251108-1"><link rel="stylesheet" href="/frontend/assets/theme.css?v=20251108-1">
  <script defer src="/frontend/assets/components.js?v=20251108-1"></script>
</head>
<body class="w3-has-top">
  <div data-component="Navbar"></div>
  <div style="display:flex;">
    <div data-component="Sidebar"></div>
    <main class="w3-container w3-section" style="flex:1;max-width:1120px;">
      <section class="section-head"><div>
        <h1 class="section-title">Audit Logs</h1>
        <p class="section-sub">Security and activity history</p>
      </div></section>
      <div style="display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap">
        <button id="btnCSV" class="w3-button w3-outline" type="button">Export CSV</button>
        <button id="btnPDF" class="w3-button w3-outline" type="button">Export PDF</button>
      </div>
      <div id="logWrap" class="table-wrap"></div>
    </main>
  </div>
  <div data-component="Footer"></div>
  <script type="module">
    import { listLogs, exportLogsCSV, exportLogsPDF } from '/frontend/services/adminAPI.js';
    const token = localStorage.getItem('token');
    const logWrap = document.getElementById('logWrap');
    document.getElementById('btnCSV').onclick = exportLogsCSV;
    document.getElementById('btnPDF').onclick = exportLogsPDF;
    (async ()=>{
      try{
        const logs = await listLogs(token);
        const rows = (logs||[]).map(l=>`<tr><td>${l.id||''}</td><td>${l.user_id||''}</td><td>${l.action||''}</td><td>${l.resource||''}</td><td>${l.success? 'OK':'Fail'}</td><td>${l.created_at||''}</td></tr>`).join('');
        logWrap.innerHTML = `<div class='table-scroll'><table class='w3-table'><thead><tr><th>ID</th><th>User</th><th>Action</th><th>Resource</th><th>Status</th><th>At</th></tr></thead><tbody>${rows}</tbody></table></div>`;
      }catch(e){ logWrap.innerHTML = `<div class='card'>Failed to load logs</div>`; }
    })();
  </script>
</body></html>
