<div class="card">
  <h3>AI Chatbot</h3>
  <div id="chat-log" style="height:180px;overflow:auto;border:1px solid #eee;padding:8px;margin-bottom:8px"></div>
  <form id="chat-form">
    <input id="chat-input" type="text" placeholder="Ask about RAM, CPU, OS..." style="width:75%" />
    <button class="w3-button" type="submit">Ask</button>
  </form>
</div>
<script>
  (function(){
    const form = document.getElementById('chat-form');
    const input = document.getElementById('chat-input');
    const log = document.getElementById('chat-log');
    form.addEventListener('submit', async (e)=>{
      e.preventDefault();
      const q = input.value.trim(); if(!q) return;
      log.innerHTML += `<div><b>You:</b> ${q}</div>`;
      input.value='';
      try{
        const token = localStorage.getItem('token');
        const res = await fetch('/api/ai/chat', {method:'POST', headers:{'Content-Type':'application/json','Authorization':'Bearer '+token}, body: JSON.stringify({ message: q })});
        const data = await res.json();
        log.innerHTML += `<div><b>AI:</b> ${data.answer || '...'}</div>`;
        log.scrollTop = log.scrollHeight;
      }catch(err){ log.innerHTML += `<div style='color:red;'>Failed to fetch AI response</div>`; }
    });
  })();
</script>
