  <div class="main">
    <h1>🔔 Danh sách thông báo</h1>
    <ul id="notificationList" style="line-height: 1.8;"></ul>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const token = localStorage.getItem("token");

      fetch("http://localhost:5000/api/student/notifications", {
        headers: { "Authorization": "Bearer " + token }
      })
        .then(res => res.json())
        .then(data => {
          const list = document.getElementById("notificationList");
          if (!data || data.length === 0) {
            list.innerHTML = "<li>Không có thông báo nào.</li>";
            return;
          }

          list.innerHTML = data.map(n => `
            <li>
              ${n.is_read ? '✅' : '🔔'} ${n.content}
              <small style="color:gray;">(${n.created_at})</small>
            </li>
          `).join("");
        })
        .catch(err => {
          console.error("Lỗi khi tải thông báo:", err);
          document.getElementById("notificationList").innerHTML = "<li>Lỗi tải dữ liệu.</li>";
        });
    });
  </script>

</body>
</html>
