<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Bài tập - PY/PL Learn</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="../style.css">
  <style>
    .course-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
    }
    .course-card {
      background: #fff;
      padding: 15px;
      border-radius: 12px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      font-family: "Segoe UI", sans-serif;
    }
    .btn-view {
      display: inline-block;
      margin-top: 10px;
      background: #0e451a;
      color: white;
      padding: 8px 16px;
      border-radius: 6px;
      text-decoration: none;
    }
  </style>
</head>
<body>

  <div class="sidebar">
    <h2>PY/PL Learn</h2>
    <a href="../index.html">🏠 Trang chủ</a>
    <a href="../khoahoc/index.html">📚 Khóa học</a>
    <a href="#">📝 Bài tập</a>
    <a href="../idebaitap/ide.html">💻 IDE Online</a>
    <a href="../ai/ai.html">🤖 AI Trợ giúp</a>
    <a href="../danhgia/danhgia.html">⭐ Đánh giá</a>
    <a href="../thongbao/thongbao.html">🔔 Thông báo</a>
    <a href="../hoso/hoso.html">👤 Hồ sơ</a>
  </div>

  <div class="main">
    <h1>📝 Danh sách bài tập</h1>
    <div id="assignment-list" class="course-grid"></div>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const token = localStorage.getItem("token");
      if (!token) {
        alert("Bạn cần đăng nhập.");
        return;
      }

      fetch("http://localhost:5000/api/student/assignments", {
        headers: {
          "Authorization": "Bearer " + token
        }
      })
      .then(res => {
        if (!res.ok) throw new Error("Không thể lấy danh sách bài tập.");
        return res.json();
      })
      .then(data => {
        const list = document.getElementById("assignment-list");
        list.innerHTML = "";

        if (data.length === 0) {
          list.innerHTML = "<p>Không có bài tập nào.</p>";
          return;
        }

        data.forEach(ass => {
          const card = document.createElement("div");
          card.className = "course-card";
          card.innerHTML = `
            <h3>${ass.title}</h3>
            <p>${ass.description}</p>
            <p><strong>📘 Khóa học:</strong> ${ass.course_name || ass.course_id}</p>
            <p><strong>🕒 Hạn nộp:</strong> ${new Date(ass.deadline).toLocaleString()}</p>
            <a class="btn-view" href="../khoahoc/baitap.html?assignment=${ass.id}">Làm bài</a>
          `;
          list.appendChild(card);
        });
      })
      .catch(err => {
        console.error("Lỗi khi tải bài tập:", err);
        document.getElementById("assignment-list").innerHTML = "<p>Lỗi khi tải bài tập.</p>";
      });
    });
  </script>

</body>
</html>
