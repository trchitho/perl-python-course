<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>IDE Online - PY/PL Learn</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="../style.css">
  <style>
    body { display: flex; }
    .main { flex: 1; padding: 20px; }
    textarea { width: 100%; resize: vertical; font-family: monospace; }
    .editor, .stdin, .stdout { margin-bottom: 20px; }
    .stdout { background: #fafafa; padding: 10px; border: 1px solid #ddd; }
  </style>
</head>
<body>
  <div class="sidebar">
    <h2>PY/PL Learn</h2>
    <a href="../index.html">🏠 Trang chủ</a>
    <a href="../khoahoc/index.html">📘 Khóa học</a>
    <a href="../baitap/baitap.html">📝 Bài tập</a>
    <a href="#">💻 IDE Online</a>
    <a href="../ai/ai.html">🤖 AI Trợ giúp</a>
    <a href="../danhgia/danhgia.html">⭐ Đánh giá</a>
    <a href="../thongbao/thongbao.html">🔔 Thông báo</a>
    <a href="../hoso/hoso.html">👤 Hồ sơ</a>
  </div>

  <div class="main">
    <h1>💻 IDE Online</h1>

    <div class="editor">
      <h2>Mã nguồn (Python)</h2>
      <textarea id="code-editor" rows="12" placeholder="# Viết mã Python tại đây..."></textarea>
    </div>

    <div class="stdin">
      <h2>Đầu vào (Input)</h2>
      <textarea id="stdin-editor" rows="4" placeholder="Nhập dữ liệu input..."></textarea>
    </div>

    <button id="run-btn" class="btn-view">▶️ Chạy chương trình</button>

    <div class="stdout">
      <h2>Kết quả (Output)</h2>
      <pre id="output"></pre>
    </div>
  </div>

  <script src="ide.js"></script>
</body>
</html>
