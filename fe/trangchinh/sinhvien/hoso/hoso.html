<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Hồ sơ - PY/PL Learn</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="../style.css">
</head>
<body>

  <div class="sidebar">
    <h2>PY/PL Learn</h2>
    <a href="../index.html">🏠 Trang chủ</a>
    <a href="../khoahoc/index.html">📚 Khóa học</a>
    <a href="../baitap/baitap.html">📝 Bài tập</a>
    <a href="../idebaitap/ide.html">💻 IDE Online</a>
    <a href="../ai/ai.html">🤖 AI Trợ giúp</a>
    <a href="../danhgia/danhgia.html">⭐ Đánh giá</a>
    <a href="../thongbao/thongbao.html">🔔 Thông báo</a>
    <a href="#">👤 Hồ sơ</a>
  </div>

  <div class="main">
    <h1>👤 Hồ sơ cá nhân</h1>

    <div class="card">
    <img id="avatar" src="https://i.pravatar.cc/100" alt="avatar" style="width:100px; border-radius: 50%">
    <p><b>Họ tên:</b> <span id="fullname"></span></p>
    <p><b>Email:</b> <span id="email"></span></p>
    </div>

  </div>
<script>
document.addEventListener("DOMContentLoaded", () => {
  const token = localStorage.getItem("token");

  fetch("http://localhost:5000/api/student/profile", {
    headers: { "Authorization": "Bearer " + token }
  })
    .then(res => res.json())
    .then(data => {
      document.getElementById("fullname").textContent = data.fullname;
      document.getElementById("email").textContent = data.email;

      // Gán avatar nếu có
      const avatar = document.getElementById("avatar");
      avatar.src = data.avatar_url || "https://i.pravatar.cc/100?u=" + data.email;
    })
    .catch(err => {
      console.error("Lỗi khi tải hồ sơ:", err);
    });
});
</script>


</body>
</html>
