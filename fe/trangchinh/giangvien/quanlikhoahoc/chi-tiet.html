<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Chi tiết khóa học</title>
</head>
<body>
  <h1 id="course-title"></h1>
  <p id="course-description"></p>
  <h2>Bài học</h2>
  <ul id="lesson-list"></ul>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const courseId = urlParams.get("course_id");
    const token = localStorage.getItem("token");

    fetch(`http://localhost:5000/api/teacher/courses/${courseId}`, {
      headers: {
        "Authorization": "Bearer " + token
      }
    })
    .then(res => res.json())
    .then(data => {
      document.getElementById("course-title").innerText = data.name;
      document.getElementById("course-description").innerText = data.description;

      data.lessons.forEach(lesson => {
        const li = document.createElement("li");
        li.innerText = lesson.title;
        document.getElementById("lesson-list").appendChild(li);
      });
    });
  </script>
</body>
</html>
