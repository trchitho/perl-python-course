</head>
<body>
  <div class="sidebar">
    <h2>GIẢNG VIÊN</h2>

  </div>

  <div class="main">
    <h1>Tạo bài học mới</h1>

    <!-- FORM TẠO BÀI -->
    <form id="lesson-form">
      <label for="lesson_name">Tên bài học:</label><br>
      <input type="text" id="lesson_name" name="lesson_name" required><br><br>

      <label for="content">Nội dung:</label><br>
      <textarea id="content" name="content" cols="100" rows="10" required></textarea><br><br>

      <label for="image-upload">📷 Tải ảnh vào nội dung:</label><br>
      <input type="file" id="image-upload" accept="image/*"><br><br>

      <label for="course">Thuộc khóa học:</label><br>
      <select id="course" name="course" required>
        <option value="">-- Chọn khóa học --</option>
      </select><br><br>

      <button type="submit">Tạo bài học</button>
      <div id="success-message" style="display:none; font-weight: bold; color: green;"></div>
    </form>

    <!-- FORM TẢI FILE -->
    <hr>
    <h3>📂 Tải bài học từ file</h3>
    <form id="upload-form" onsubmit="return false;" enctype="multipart/form-data">
      <input type="file" name="file" accept=".txt,.pdf,.docx" required />
      <select name="course_id" id="upload-course-id" required>
        <option value="">-- Chọn khóa học --</option>
      </select>
      <button type="submit">Tải lên bài học</button>
    </form>

    <!-- XEM TRƯỚC -->
    <div id="lesson-preview" class="lesson-preview" style="display:none; margin-top: 20px;">
      <h3>📘 Bài học vừa tạo:</h3>
      <p><strong>Tên bài học:</strong> <span id="preview-name"></span></p>
      <p><strong>Nội dung:</strong></p>
      <div id="preview-desc" style="border:1px solid #ccc; padding:10px"></div>
      <p><strong>Thuộc khóa học:</strong> <span id="preview-course"></span></p>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
