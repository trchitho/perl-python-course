<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <title>Đăng ký - PY/PL Learn</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="../static/style.css" />
</head>
<body>
  <div class="login-container">
    <h2>Đăng ký Sinh viên</h2>
    <form id="registerForm" onsubmit="submitForm(event)">
    <input type="text" id="fullname" placeholder="Họ và tên" required />
    <input type="email" id="email" placeholder="Email" required />
    <input type="password" id="password" placeholder="Mật khẩu" required />
    <select id="role" required>
    <option value="student">Học sinh</option>
    <option value="teacher">Giáo viên</option>
    </select>
    <div id="departmentField" style="display: none;">
    <input type="text" id="department" placeholder="Bộ môn (chỉ giáo viên)" />
    </div>

    <button type="submit">Đăng ký</button>
    </form>

    <div id="result"></div>
  </div>

  <!-- Liên kết file register.js -->
  <script src="register.js"></script>
</body>
</html>
